<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hiraticket — Platform console</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="ui.css" />
<link rel="stylesheet" href="views.css" />
<link rel="stylesheet" href="platform.css" />
<style>
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--ink); z-index: 999; }
  #boot .b { width: 56px; height: 56px; border-radius: 16px; background: var(--brand); color: var(--on-brand); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 28px; font-family: 'Archivo Expanded','Archivo',sans-serif; animation: ht-pulse 1.3s infinite; }
</style>
<script>
  (function () {
    try {
      var t = JSON.parse(localStorage.getItem('ht_theme') || '"light"');
      document.documentElement.dataset.theme = t;
      var l = JSON.parse(localStorage.getItem('ht_lang') || '"es"');
      document.documentElement.lang = l;
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="root"></div>
<div id="boot"><div class="b">H</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="i18n.js"></script>
<script src="strings_ext.js"></script>
<script src="plans.js"></script>
<script src="platform_data.js"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="platform.jsx"></script>
<script type="text/babel" src="platform2.jsx"></script>
<script type="text/babel" data-presets="env,react">
  (function () {
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      if (document.querySelector('#root').children.length > 0 || tries > 60) {
        var b = document.getElementById('boot');
        if (b) { b.style.transition = 'opacity .3s'; b.style.opacity = '0'; setTimeout(function(){ b.remove(); }, 320); }
        clearInterval(iv);
      }
    }, 100);
  })();
</script>
</body>
</html>
