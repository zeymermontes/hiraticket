<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hiraticket — Chats & Pedidos</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="ui.css" />
<link rel="stylesheet" href="views.css" />
<link rel="stylesheet" href="platform.css" />
<style>
  /* early-paint helpers + responsive bits */
  .hide-narrow { display: inline; }
  @media (max-width: 1080px) { .hide-narrow { display: none; } }
  @media (max-width: 880px) { .login-grid { grid-template-columns: 1fr !important; } .login-grid > div:first-child { display: none !important; } }
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--ink); z-index: 999; }
  #boot .b { width: 56px; height: 56px; border-radius: 16px; background: var(--brand); color: var(--on-brand); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 28px; font-family: 'Archivo Expanded','Archivo',sans-serif; animation: ht-pulse 1.3s infinite; }
</style>
<script>
  // avoid theme flash
  (function () {
    try {
      var t = JSON.parse(localStorage.getItem('ht_theme') || '"light"');
      document.documentElement.dataset.theme = t;
      var b = JSON.parse(localStorage.getItem('ht_brand') || '"#F5C518"');
      var map = { '#0D9488':{on:'#fff',v:{'--brand':'#0D9488','--brand-600':'#0B7C72','--brand-700':'#0A6B62','--brand-300':'#5EC9BF','--brand-100':'#C9EEEA','--brand-50':'#E6F6F4'}}, '#4F46E5':{on:'#fff',v:{'--brand':'#4F46E5','--brand-600':'#4338CA','--brand-700':'#3730A3','--brand-300':'#A5A0F0','--brand-100':'#DEDCFB','--brand-50':'#EEEDFD'}}, '#EA580C':{on:'#fff',v:{'--brand':'#EA580C','--brand-600':'#C2410C','--brand-700':'#9A3412','--brand-300':'#F6A977','--brand-100':'#FCDCC4','--brand-50':'#FDEFE5'}} };
      if (map[b]) { var r = document.documentElement; Object.keys(map[b].v).forEach(function(k){ r.style.setProperty(k, map[b].v[k]); }); r.style.setProperty('--on-brand', map[b].on); }
      var l = JSON.parse(localStorage.getItem('ht_lang') || '"es"');
      document.documentElement.lang = l;
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="root"></div>
<div id="boot"><div class="b">H</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="verticals.js"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="orders.jsx"></script>
<script type="text/babel" src="kanban.jsx"></script>
<script type="text/babel" src="automations.jsx"></script>
<script type="text/babel" src="newviews.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" data-presets="env,react">
  // remove boot splash once React mounts
  (function () {
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      if (document.querySelector('#root').children.length > 0 || tries > 60) {
        var b = document.getElementById('boot');
        if (b) { b.style.transition = 'opacity .3s'; b.style.opacity = '0'; setTimeout(function(){ b.remove(); }, 320); }
        clearInterval(iv);
      }
    }, 100);
  })();
</script>
</body>
</html>
