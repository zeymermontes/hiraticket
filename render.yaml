# Render Blueprint — deploys the Hiraticket Next.js app as a web service.
# Database + auth are provided by Supabase (managed separately), so this
# blueprint only declares the web service and its environment.
#
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo.
# Then set the three Supabase env vars (marked sync:false) in the dashboard.
services:
  - type: web
    name: hiraticket
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # WhatsApp worker (whatsmeow, Go). Sessions persist in Postgres — no disk needed.
  - type: worker
    name: hiraticket-whatsapp
    runtime: docker
    dockerfilePath: ./services/whatsapp/Dockerfile
    dockerContext: ./services/whatsapp
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    envVars:
      # IMPORTANT: use the Supabase **Session pooler** (IPv4, port 5432). The direct
      # db.<ref>.supabase.co host is IPv6-only and Render can't reach it. Do NOT use the
      # transaction pooler (6543): whatsmeow's sqlstore needs session features.
      # postgresql://postgres.<ref>:PASSWORD@aws-1-<region>.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Used to store inbound media in the 'media' storage bucket.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
